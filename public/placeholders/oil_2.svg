<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 400">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0d1b2a"/>
      <stop offset="100%" style="stop-color:#1b263b"/>
    </linearGradient>
    <linearGradient id="bottle" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#2a6344"/>
      <stop offset="100%" style="stop-color:#1e3c27"/>
    </linearGradient>
    <linearGradient id="liquid" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#42825e;stop-opacity:0.9"/>
      <stop offset="100%" style="stop-color:#2a6344"/>
    </linearGradient>
    <linearGradient id="dropper" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#cfaa6b"/>
      <stop offset="100%" style="stop-color:#8a6d3b"/>
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="6" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="6" stdDeviation="10" flood-color="#000" flood-opacity="0.5"/>
    </filter>
  </defs>
  <rect width="400" height="400" fill="url(#bg)"/>
  <g filter="url(#shadow)" transform="translate(155,40)">
    <rect x="22" y="0" width="46" height="50" rx="6" fill="url(#dropper)" opacity="0.9"/>
    <ellipse cx="45" cy="50" rx="5" ry="8" fill="#cfaa6b"/>
    <rect x="0" y="55" width="90" height="230" rx="10" fill="url(#bottle)"/>
    <rect x="8" y="120" width="74" height="155" rx="6" fill="url(#liquid)"/>
    <rect x="12" y="65" width="66" height="40" rx="4" fill="rgba(255,255,255,0.06)"/>
    <text x="45" y="88" text-anchor="middle" font-family="serif" font-size="11" fill="#cfaa6b" font-weight="bold">FULL</text>
    <text x="45" y="100" text-anchor="middle" font-family="serif" font-size="8" fill="rgba(207,170,107,0.6)">SPECTRUM</text>
    <rect x="12" y="60" width="20" height="200" rx="3" fill="rgba(255,255,255,0.1)"/>
  </g>
  <circle cx="320" cy="80" r="3" fill="#cfaa6b" opacity="0.3" filter="url(#glow)"/>
  <circle cx="80" cy="320" r="2" fill="#42825e" opacity="0.3" filter="url(#glow)"/>
  <text x="200" y="375" text-anchor="middle" font-family="sans-serif" font-size="10" fill="rgba(207,170,107,0.35)" letter-spacing="3">VILA CÃNHAMO</text>
</svg>