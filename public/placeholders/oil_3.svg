<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 400">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#121812"/>
      <stop offset="100%" style="stop-color:#1a2a1a"/>
    </linearGradient>
    <linearGradient id="bottle" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#cfaa6b"/>
      <stop offset="50%" style="stop-color:#a08040"/>
      <stop offset="100%" style="stop-color:#6b5530"/>
    </linearGradient>
    <linearGradient id="gold" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#f5e6c8"/>
      <stop offset="100%" style="stop-color:#cfaa6b"/>
    </linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="6" stdDeviation="10" flood-color="#000" flood-opacity="0.5"/>
    </filter>
    <filter id="glow">
      <feGaussianBlur stdDeviation="8" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>
  <rect width="400" height="400" fill="url(#bg)"/>
  <g filter="url(#shadow)" transform="translate(140,50)">
    <rect x="25" y="0" width="70" height="22" rx="5" fill="url(#gold)"/>
    <rect x="0" y="22" width="120" height="280" rx="16" fill="url(#bottle)"/>
    <rect x="10" y="120" width="100" height="170" rx="10" fill="rgba(180,140,60,0.4)"/>
    <rect x="15" y="35" width="90" height="70" rx="6" fill="rgba(0,0,0,0.2)"/>
    <text x="60" y="70" text-anchor="middle" font-family="serif" font-size="16" fill="url(#gold)" font-weight="bold">GOLD</text>
    <text x="60" y="88" text-anchor="middle" font-family="serif" font-size="9" fill="rgba(245,230,200,0.6)">EDITION</text>
    <rect x="15" y="27" width="30" height="260" rx="5" fill="rgba(255,255,255,0.12)"/>
  </g>
  <circle cx="60" cy="60" r="4" fill="#cfaa6b" opacity="0.2" filter="url(#glow)"/>
  <circle cx="340" cy="340" r="3" fill="#cfaa6b" opacity="0.15" filter="url(#glow)"/>
  <text x="200" y="380" text-anchor="middle" font-family="sans-serif" font-size="10" fill="rgba(207,170,107,0.3)" letter-spacing="3">VILA CBD</text>
</svg>