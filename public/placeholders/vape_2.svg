<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 400">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#1a2a3a"/>
      <stop offset="100%" style="stop-color:#0d1a2d"/>
    </linearGradient>
    <linearGradient id="body" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#30cfd0"/>
      <stop offset="100%" style="stop-color:#330867"/>
    </linearGradient>
    <linearGradient id="screen" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#1a3a4a"/>
      <stop offset="100%" style="stop-color:#0a1a2a"/>
    </linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="6" stdDeviation="10" flood-color="#000" flood-opacity="0.5"/>
    </filter>
    <filter id="glow">
      <feGaussianBlur stdDeviation="4" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>
  <rect width="400" height="400" fill="url(#bg)"/>
  <g filter="url(#shadow)" transform="translate(160,40)">
    <rect x="-5" y="0" width="50" height="25" rx="6" fill="#555"/>
    <rect x="0" y="0" width="40" height="20" rx="4" fill="#444"/>
    <rect x="-15" y="25" width="80" height="300" rx="16" fill="url(#body)"/>
    <rect x="-5" y="50" width="60" height="45" rx="8" fill="url(#screen)" stroke="rgba(48,207,208,0.3)" stroke-width="1"/>
    <text x="25" y="78" text-anchor="middle" font-family="monospace" font-size="12" fill="#30cfd0" filter="url(#glow)">200°C</text>
    <rect x="0" y="115" width="50" height="4" rx="2" fill="rgba(255,255,255,0.15)"/>
    <rect x="0" y="128" width="50" height="4" rx="2" fill="rgba(255,255,255,0.15)"/>
    <rect x="-5" y="250" width="60" height="30" rx="6" fill="rgba(0,0,0,0.3)"/>
    <text x="25" y="270" text-anchor="middle" font-family="sans-serif" font-size="8" fill="rgba(255,255,255,0.5)">POWER</text>
    <rect x="-10" y="30" width="18" height="280" rx="4" fill="rgba(255,255,255,0.08)"/>
  </g>
  <text x="200" y="380" text-anchor="middle" font-family="sans-serif" font-size="10" fill="rgba(48,207,208,0.3)" letter-spacing="3">VILA CÃNHAMO</text>
</svg>