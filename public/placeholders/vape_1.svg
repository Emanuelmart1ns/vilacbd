<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 400">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#1a1a2e"/>
      <stop offset="100%" style="stop-color:#0d0d1a"/>
    </linearGradient>
    <linearGradient id="body" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#f6d365"/>
      <stop offset="50%" style="stop-color:#fda085"/>
      <stop offset="100%" style="stop-color:#f093fb"/>
    </linearGradient>
    <linearGradient id="mouth" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#e0e0e0"/>
      <stop offset="100%" style="stop-color:#9e9e9e"/>
    </linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="6" stdDeviation="10" flood-color="#000" flood-opacity="0.5"/>
    </filter>
    <filter id="glow">
      <feGaussianBlur stdDeviation="6" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>
  <rect width="400" height="400" fill="url(#bg)"/>
  <g filter="url(#shadow)" transform="translate(170,30)">
    <rect x="0" y="0" width="20" height="30" rx="4" fill="url(#mouth)"/>
    <rect x="-15" y="30" width="50" height="300" rx="20" fill="url(#body)"/>
    <rect x="-10" y="40" width="40" height="60" rx="10" fill="rgba(255,255,255,0.15)"/>
    <text x="10" y="70" text-anchor="middle" font-family="sans-serif" font-size="7" fill="rgba(0,0,0,0.5)" font-weight="bold">CBD</text>
    <text x="10" y="80" text-anchor="middle" font-family="sans-serif" font-size="5" fill="rgba(0,0,0,0.3)">600 PUFFS</text>
    <rect x="-8" y="130" width="36" height="3" rx="1" fill="rgba(255,255,255,0.2)"/>
    <rect x="-8" y="140" width="28" height="3" rx="1" fill="rgba(255,255,255,0.15)"/>
    <rect x="-8" y="150" width="36" height="3" rx="1" fill="rgba(255,255,255,0.2)"/>
    <circle cx="10" cy="300" r="5" fill="rgba(255,255,255,0.4)"/>
    <rect x="-5" y="35" width="12" height="280" rx="4" fill="rgba(255,255,255,0.1)"/>
  </g>
  <g opacity="0.3" filter="url(#glow)">
    <circle cx="180" cy="20" r="3" fill="#f6d365"/>
    <circle cx="220" cy="25" r="2" fill="#fda085"/>
    <circle cx="170" cy="15" r="2" fill="#f093fb"/>
  </g>
  <text x="200" y="385" text-anchor="middle" font-family="sans-serif" font-size="10" fill="rgba(246,211,101,0.3)" letter-spacing="3">VILA CBD</text>
</svg>